# =============================================================
# JOB INTELLIGENT - Version avec Chromium (image custom)
# Airflow 2.9.3 + Chromium via Dockerfile dédié
# =============================================================

x-airflow-common: &airflow-common
  # ✅ Image custom buildée depuis Dockerfile.airflow
  build:
    context: .
    dockerfile: Dockerfile.airflow
  image: job-intelligent-airflow:latest
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@airflow-redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: '1'
    PYTHONPATH: /opt/airflow/scrapers:/opt/airflow
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ACCESS_KEY: minio_admin
    MINIO_SECRET_KEY: minio_password
    KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    FRANCE_TRAVAIL_CLIENT_ID: ${FRANCE_TRAVAIL_CLIENT_ID}
    FRANCE_TRAVAIL_CLIENT_SECRET: ${FRANCE_TRAVAIL_CLIENT_SECRET}
    ADZUNA_APP_ID: ${ADZUNA_APP_ID}
    ADZUNA_APP_KEY: ${ADZUNA_APP_KEY}
    # ✅ Vide car déjà installé dans le Dockerfile
    _PIP_ADDITIONAL_REQUIREMENTS: ''
    PIP_INDEX_URL: 'https://mirrors.aliyun.com/pypi/simple/'
    PIP_DEFAULT_TIMEOUT: '300'
    CHROME_BIN: /usr/bin/chromium
    CHROMEDRIVER_PATH: /usr/bin/chromedriver
  volumes:
    - ./airflow_dags:/opt/airflow/dags
    - ./airflow_logs:/opt/airflow/logs
    - ./airflow_config:/opt/airflow/config
    - ./airflow_plugins:/opt/airflow/plugins
    - ./ingestion/scrapers:/opt/airflow/scrapers
    - ./scripts:/opt/airflow/scripts
    - ./airflow_scripts:/opt/airflow/airflow_scripts
    - ./requirements.txt:/opt/airflow/requirements.txt
  depends_on:
    postgres:
      condition: service_healthy
    airflow-redis:
      condition: service_healthy
  networks:
    - job-net

services:

  # =============================================================
  # KAFKA STACK
  # =============================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - job-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 24
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - job-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: job-intelligent
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    ports:
      - "8085:8080"
    networks:
      - job-net

  # =============================================================
  # MINIO - Data Lake
  # =============================================================
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - job-net

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minio_admin minio_password;
        mc mb --ignore-existing local/bronze;
        mc mb --ignore-existing local/silver;
        mc mb --ignore-existing local/gold;
        mc mb --ignore-existing local/models;
        echo 'Buckets créés.';
        exit 0;
      "
    networks:
      - job-net

  # =============================================================
  # POSTGRESQL - Data Warehouse
  # =============================================================
  postgres-dwh:
    image: postgres:15
    container_name: postgres-dwh
    environment:
      POSTGRES_USER: dwh_user
      POSTGRES_PASSWORD: dwh_password
      POSTGRES_DB: job_intelligent_dwh
    volumes:
      - postgres-dwh-data:/var/lib/postgresql/data
      - ./data_warehouse/schema:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "dwh_user"]
      interval: 10s
      retries: 5
    networks:
      - job-net

  # =============================================================
  # REDIS - Cache
  # =============================================================
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - job-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================================
  # AIRFLOW
  # =============================================================
  postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    networks:
      - job-net

  airflow-redis:
    image: redis:7.2-bookworm
    container_name: airflow-redis
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: always
    networks:
      - job-net

  # ✅ Init simple : Chromium déjà dans l'image, juste migrate + user
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        echo "⏳ Attente de PostgreSQL..."
        until pg_isready -h postgres -U airflow; do
          echo "PostgreSQL pas encore prêt, attente 3s..."
          sleep 3
        done
        echo "🗄️ Migration de la base de données Airflow..."
        airflow db migrate
        echo "👤 Création de l'utilisateur admin..."
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin || true
        echo "✅ Airflow initialisé avec succès."

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8090:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-redis:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    networks:
      - job-net

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-redis:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    networks:
      - job-net

  airflow-worker:
    <<: *airflow-common
    container_name: airflow-worker
    command: celery worker
    environment:
      <<: *airflow-env
      DUMB_INIT_SETSID: "0"
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-redis:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    networks:
      - job-net

  # =============================================================
  # SPARK
  # =============================================================
  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    networks:
      - job-net

  spark-worker-1:
    image: apache/spark:3.5.0
    container_name: spark-worker-1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    networks:
      - job-net

  # =============================================================
  # FLINK
  # =============================================================
  flink-jobmanager:
    image: flink:1.18-scala_2.12
    container_name: flink-jobmanager
    ports:
      - "8082:8081"
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
    command: jobmanager
    networks:
      - job-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 30s
      timeout: 10s
      retries: 5

  flink-taskmanager:
    image: flink:1.18-scala_2.12
    container_name: flink-taskmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
    command: taskmanager
    depends_on:
      - flink-jobmanager
    networks:
      - job-net

  # =============================================================
  # API
  # =============================================================
  recommendation-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: recommendation-api
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      POSTGRES_HOST: postgres-dwh
      POSTGRES_DB: job_intelligent_dwh
      POSTGRES_USER: dwh_user
      POSTGRES_PASSWORD: dwh_password
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio_admin
      MINIO_SECRET_KEY: minio_password
    depends_on:
      - redis
      - kafka
      - postgres-dwh
    networks:
      - job-net

# =============================================================
# VOLUMES
# =============================================================
volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  minio-data:
  postgres-dwh-data:
  postgres-db-volume:

# =============================================================
# NETWORK
# =============================================================
networks:
  job-net:
    driver: bridge
