# =============================================================
# JOB INTELLIGENT - Version Allégée (pour PC avec RAM limitée)
# Spark (Batch/ML) + Flink (Streaming/Realtime)
# =============================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-changeme_generate_with_python}
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ACCESS_KEY: minio_admin
    MINIO_SECRET_KEY: minio_password
    KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  volumes:
    - ./ingestion/pipelines/airflow_dags:/opt/airflow/dags
    - ./ingestion/scrapers:/opt/airflow/scrapers
    - ./logs/airflow:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  depends_on:
    postgres-airflow:
      condition: service_healthy
  networks:
    - job-net

services:

  # =============================================================
  # KAFKA STACK - Event Bus Central
  # =============================================================
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - job-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 24
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - job-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: job-intelligent
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "8085:8080"
    networks:
      - job-net

  # =============================================================
  # MINIO - Data Lake (Bronze/Silver/Gold)
  # =============================================================
  
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - job-net

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minio_admin minio_password;
        mc mb --ignore-existing local/bronze;
        mc mb --ignore-existing local/silver;
        mc mb --ignore-existing local/gold;
        mc mb --ignore-existing local/models;
        echo 'Buckets bronze / silver / gold / models crees.';
        exit 0;
      "
    networks:
      - job-net

  # =============================================================
  # KAFKA CONNECT - S3 Sink pour persistance automatique
  # =============================================================
  
  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.5.0
    container_name: kafka-connect
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: job-intelligent-connect
      CONNECT_CONFIG_STORAGE_TOPIC: connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: 'false'
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
      AWS_ACCESS_KEY_ID: minio_admin
      AWS_SECRET_ACCESS_KEY: minio_password
    ports:
      - "8083:8083"
    volumes:
      - ./kafka/connectors:/etc/kafka-connect/connectors
    command: >
      bash -c "
        confluent-hub install --no-prompt confluentinc/kafka-connect-s3:10.5.7 &&
        /etc/confluent/docker/run
      "
    networks:
      - job-net

  kafka-connect-init:
    image: curlimages/curl:latest
    container_name: kafka-connect-init
    depends_on:
      - kafka-connect
    volumes:
      - ./kafka/connectors:/connectors
    entrypoint: >
      /bin/sh -c "
        echo 'Attente de Kafka Connect...';
        sleep 30;
        curl -s -X POST http://kafka-connect:8083/connectors \
          -H 'Content-Type: application/json' \
          -d '{
            \"name\": \"s3-sink-indeed\",
            \"config\": {
              \"connector.class\": \"io.confluent.connect.s3.S3SinkConnector\",
              \"tasks.max\": \"1\",
              \"topics\": \"indeed-offres\",
              \"s3.region\": \"us-east-1\",
              \"s3.bucket.name\": \"bronze\",
              \"store.url\": \"http://minio:9000\",
              \"storage.class\": \"io.confluent.connect.s3.storage.S3Storage\",
              \"format.class\": \"io.confluent.connect.s3.format.json.JsonFormat\",
              \"flush.size\": \"10\"
            }
          }';
        curl -s -X POST http://kafka-connect:8083/connectors \
          -H 'Content-Type: application/json' \
          -d '{
            \"name\": \"s3-sink-linkedin\",
            \"config\": {
              \"connector.class\": \"io.confluent.connect.s3.S3SinkConnector\",
              \"tasks.max\": \"1\",
              \"topics\": \"linkedin-offres\",
              \"s3.region\": \"us-east-1\",
              \"s3.bucket.name\": \"bronze\",
              \"store.url\": \"http://minio:9000\",
              \"storage.class\": \"io.confluent.connect.s3.storage.S3Storage\",
              \"format.class\": \"io.confluent.connect.s3.format.json.JsonFormat\",
              \"flush.size\": \"10\"
            }
          }';
        echo 'Connecteurs S3 Sink enregistres.';
      "
    networks:
      - job-net

  # =============================================================
  # APACHE SPARK - Batch Processing & ML Training (Version Allégée)
  # =============================================================
  
  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    networks:
      - job-net

  spark-worker-1:
    image: apache/spark:3.5.0
    container_name: spark-worker-1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    networks:
      - job-net
  spark-ml-trainer:
    image: apache/spark:3.5.0
    container_name: spark-ml-trainer
    environment:
      SPARK_MASTER_URL: spark://spark-master:7077
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio_admin
      MINIO_SECRET_KEY: minio_password
      POSTGRES_HOST: postgres-dwh
      POSTGRES_PORT: 5432
      POSTGRES_DB: job_intelligent_dwh
      POSTGRES_USER: dwh_user
      POSTGRES_PASSWORD: dwh_password
    volumes:
      - ./spark/ml_jobs:/opt/spark-jobs
      - ./spark/models:/opt/spark-models
    command: >
      /bin/sh -c "
        while true; do
          echo 'Running ML training pipeline...';
          /opt/spark/bin/spark-submit \
            --master spark://spark-master:7077 \
            --executor-memory 2g \
            --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,org.postgresql:postgresql:42.6.0 \
            /opt/spark-jobs/train_recommendation_model.py;
          echo 'Training complete. Sleeping for 6 hours...';
          sleep 21600;
        done
      "
    depends_on:
      - spark-master
      - postgres-dwh
    restart: unless-stopped
    networks:
      - job-net

  # =============================================================
  # APACHE FLINK - Real-time Streaming (Version Allégée)
  # =============================================================
  
  flink-jobmanager:
    image: flink:1.18-scala_2.12
    container_name: flink-jobmanager
    ports:
      - "8082:8081"
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres-dwh
    volumes:
      - ./flink/jobs:/opt/flink-jobs
      - ./flink/checkpoints:/opt/flink-checkpoints
    command: jobmanager
    networks:
      - job-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 30s
      timeout: 10s
      retries: 5
  flink-taskmanager:
    image: flink:1.18-scala_2.12
    container_name: flink-taskmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres-dwh
    volumes:
      - ./flink/jobs:/opt/flink-jobs
      - ./flink/checkpoints:/opt/flink-checkpoints
    command: taskmanager
    depends_on:
      - flink-jobmanager
    networks:
      - job-net
    deploy:
      resources:
        limits:
          memory: 1024M

  flink-streaming-job:
    image: flink:1.18-scala_2.12
    container_name: flink-streaming-job
    depends_on:
      flink-jobmanager:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./flink/jobs:/opt/flink-jobs
      - ./flink/checkpoints:/opt/flink-checkpoints
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
    command: >
      /bin/sh -c "
        echo 'Submitting Flink streaming job...';
        /opt/flink/bin/flink run \
          --detached \
          --jobmanager flink-jobmanager:8081 \
          --class com.jobintelligent.RealtimeRecommender \
          /opt/flink-jobs/realtime-recommendation.jar;
        tail -f /dev/null
      "
    networks:
      - job-net

  # =============================================================
  # REDIS - Cache for real-time recommendations
  # =============================================================
  
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - job-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================================
  # POSTGRESQL - Data Warehouse & Feature Store
  # =============================================================
  
  postgres-dwh:
    image: postgres:15
    container_name: postgres-dwh
    environment:
      POSTGRES_USER: dwh_user
      POSTGRES_PASSWORD: dwh_password
      POSTGRES_DB: job_intelligent_dwh
    volumes:
      - postgres-dwh-data:/var/lib/postgresql/data
      - ./data_warehouse/schema:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "dwh_user"]
      interval: 10s
      retries: 5
    networks:
      - job-net

  # =============================================================
  # AIRFLOW - Configuration qui fonctionne
  # =============================================================
  
    # =============================================================
  # AIRFLOW - Version 2.6.3 (stable)
  # =============================================================
  
    # =============================================================
  # AIRFLOW - Version 2.6.3 (simplifiée)
  # =============================================================
  
    # =============================================================
  # AIRFLOW - Configuration identique à l'autre projet
  # =============================================================
  
  postgres:
    image: postgres:16
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    networks:
      - job-net

  airflow-redis:
    image: redis:7.2-bookworm
    container_name: airflow-redis
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: always
    networks:
      - job-net

  airflow-init:
    image: apache/airflow:3.1.7
    container_name: airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://@airflow-redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'true'
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    volumes:
      - ./airflow_dags:/opt/airflow/dags
      - ./airflow_logs:/opt/airflow/logs
      - ./airflow_config:/opt/airflow/config
      - ./airflow_plugins:/opt/airflow/plugins
    user: "0:0"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-redis:
        condition: service_healthy
    networks:
      - job-net

  airflow-apiserver:
    image: apache/airflow:3.1.7
    container_name: airflow-apiserver
    command: api-server
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://@airflow-redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio_admin
      MINIO_SECRET_KEY: minio_password
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    volumes:
      - ./airflow_dags:/opt/airflow/dags
      - ./airflow_logs:/opt/airflow/logs
      - ./ingestion/scrapers:/opt/airflow/scrapers
    user: "50000:0"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]  # Changé ici
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-redis:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    networks:
      - job-net

  airflow-scheduler:
    image: apache/airflow:3.1.7
    container_name: airflow-scheduler
    command: scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://@airflow-redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'true'
    volumes:
      - ./airflow_dags:/opt/airflow/dags
      - ./airflow_logs:/opt/airflow/logs
      - ./airflow_config:/opt/airflow/config
      - ./airflow_plugins:/opt/airflow/plugins
      - ./ingestion/scrapers:/opt/airflow/scrapers
    user: "50000:0"
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-redis:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    networks:
      - job-net

  airflow-worker:
    image: apache/airflow:3.1.7
    container_name: airflow-worker
    command: celery worker
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://@airflow-redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'true'
      DUMB_INIT_SETSID: "0"
    volumes:
      - ./airflow_dags:/opt/airflow/dags
      - ./airflow_logs:/opt/airflow/logs
      - ./airflow_config:/opt/airflow/config
      - ./airflow_plugins:/opt/airflow/plugins
      - ./ingestion/scrapers:/opt/airflow/scrapers
    user: "50000:0"
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-redis:
        condition: service_healthy
      airflow-apiserver:
        condition: service_healthy
    networks:
      - job-net

  # =============================================================
  # API - REST Interface for recommendations
  # =============================================================
  
  recommendation-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: recommendation-api
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      POSTGRES_HOST: postgres-dwh
      POSTGRES_DB: job_intelligent_dwh
      POSTGRES_USER: dwh_user
      POSTGRES_PASSWORD: dwh_password
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio_admin
      MINIO_SECRET_KEY: minio_password
    depends_on:
      - redis
      - kafka
      - postgres-dwh
      - flink-streaming-job
    networks:
      - job-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# =============================================================
# VOLUMES
# =============================================================
volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  minio-data:
  postgres-dwh-data:
  airflow-postgres-db-volume:
  postgres-db-volume:

# =============================================================
# NETWORK
# =============================================================
networks:
  job-net:
    driver: bridge